[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
deleted = "´ÆÄ"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
format = '[( $all_status $ahead_behind)]($style)'
style = "bold bg:color_bg3 fg:color_text2"
	
[hostname]
format = "[@$hostname]($style)"
ssh_only = true
ssh_symbol = "¯¼ü "
style = "bg:color_bg1 fg:color_text2"
	
[os]
format = "[$symbol]($style)"
style = "bg:color_bg1 fg:color_white"
disabled = false
	
[username]
disabled = false
format = "[$user]($style)"
show_always = false
style_root = "bg:color_bg1 fg:color_red"
style_user = "bg:color_bg1 fg:color_white"
	
