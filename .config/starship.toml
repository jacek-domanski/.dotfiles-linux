color_text3 = "#9FB0D6"
	
[character]
error_symbol = "[´Çı](bold color_red)"
success_symbol = "[ÔØ»](bold color_green)"
	
[cmd_duration]
format = "[$duration](bg:color_bg5 fg:color_text3)"
min_time = 500
	
[directory]
style = "bg:color_bg2 fg:color_text2"
format = "[$path]($style)"
truncation_length = 4
truncation_symbol = "ÔÇĞ/"
truncate_to_repo = false
	
[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
	
[git_branch]
symbol = "´Éİ"
style = "bg:color_bg3 fg:color_text2"
